server:
  port: 8083

spring:
  application:
    name: pagos-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27030/pagos}
      database: pagos

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
